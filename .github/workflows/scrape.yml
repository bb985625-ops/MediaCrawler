name: Run MediaCrawler

on:
  # 你可以根据需要设置触发方式
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点运行（UTC时间）
  workflow_dispatch:  # 也支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ========== 关键步骤：使用 Secret 传入 Cookie ==========
      - name: Run MediaCrawler with cookie
        env:
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
        run: |
          python3 main.py \
            --platform xhs \
            --lt cookie \
            --cookies "$XHS_COOKIE" \
            --type detail
name: 小红书评论采集

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 从 Excel 提取笔记 ID
        run: python3 extract_ids.py

      - name: 运行爬虫（使用 Cookie 文件）
        run: python3 main.py --platform xhs --lt cookie --cookie-path xiaohongshu_cookies.json --type detail

      - name: 清洗评论
        run: python3 clean_comments.py

      - name: 保存结果
        uses: actions/upload-artifact@v4
        with:
          name: xhs-comments
          path: data/
