name: 小红书评论采集

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 运行爬虫
        env:
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
        run: python3 main.py --platform xhs --lt cookie --cookie $XHS_COOKIE --type detail

      - name: 保存结果
        uses: actions/upload-artifact@v4
        with:
          name: xhs-comments
          path: data/
